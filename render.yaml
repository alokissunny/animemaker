services:
  - type: web
    name: anime-maker-server
    runtime: node
    rootDir: app/server
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_TEXT_MODEL
        value: gpt-4o-mini
      - key: GEMINI_IMAGE_MODEL
        value: gemini-2.5-flash-image
      - key: VEO_MODEL
        value: veo-3.1-generate-preview
      # Optional: use Vertex AI (billed to GCP Cloud credits) instead of GOOGLE_API_KEY
      # above — see the README's "Using Vertex AI" section. Leave GOOGLE_GENAI_USE_VERTEXAI
      # unset/false to keep using the Gemini Developer API key.
      - key: GOOGLE_GENAI_USE_VERTEXAI
        sync: false
      - key: GOOGLE_CLOUD_PROJECT
        sync: false
      - key: GOOGLE_CLOUD_LOCATION
        value: us-central1
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false

  - type: web
    name: anime-maker-client
    runtime: static
    rootDir: app/client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set this to the anime-maker-server URL Render assigns (e.g.
      # https://anime-maker-server.onrender.com), then trigger a redeploy —
      # Vite bakes this in at build time, it can't be changed at runtime.
      - key: VITE_API_BASE_URL
        sync: false
